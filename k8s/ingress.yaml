apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mkjs-ingress
  namespace: mkjs
  labels:
    app.kubernetes.io/part-of: mkjs
    app.kubernetes.io/component: ingress
  annotations:
    # Cert-Manager: solicita certificado TLS automaticamente
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    # Redireciona HTTP (porta 80) para HTTPS (porta 443)
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    # Timeouts para WebSocket
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    # Habilita suporte a WebSocket para o Socket.IO do backend
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - mkjs.local
      secretName: mkjs-tls
  rules:
    - host: mkjs.local
      http:
        paths:
          # Rota do Socket.IO para o backend
          - path: /socket.io
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 55555
          # Todas as outras rotas para o frontend
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 8080
