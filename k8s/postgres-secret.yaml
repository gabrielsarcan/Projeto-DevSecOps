# TODO(security): Para produção, utilize Sealed Secrets, HashiCorp Vault ou SOPS
# para gerenciar segredos de forma segura. Valores base64 em manifests não são criptografados.
apiVersion: v1
kind: Secret
metadata:
  name: postgres-credentials
  namespace: mkjs
  labels:
    app.kubernetes.io/part-of: mkjs
    app.kubernetes.io/component: database
type: Opaque
data:
  # Valores codificados em base64:
  # echo -n 'postgres' | base64 -> cG9zdGdyZXM=
  # echo -n 'mkjs_db' | base64 -> bWtqc19kYg==
  POSTGRES_USER: cG9zdGdyZXM=
  POSTGRES_PASSWORD: cG9zdGdyZXM=
  POSTGRES_DB: bWtqc19kYg==
