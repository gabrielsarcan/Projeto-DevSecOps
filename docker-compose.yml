version: '3.8'

services:
  app:
    build: .
    ports:
      - "55555:55555"
    environment:
      - DATABASE_URL=postgres://postgres:postgres@db:5432/mkjs_db
    depends_on:
      - db
    volumes:
      - ./server:/app/server
      - /app/server/node_modules
      - ./game:/app/game

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=mkjs_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
